name: Sync All Forks

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync all forks
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh repo list --fork --json nameWithOwner,parent,defaultBranch --limit 100 | \
          jq -c '.[]' | while read -r repo; do
            fork=$(echo "$repo" | jq -r '.nameWithOwner')
            upstream=$(echo "$repo" | jq -r '.parent.nameWithOwner')
            branch=$(echo "$repo" | jq -r '.defaultBranch')
            echo "Syncing $fork from $upstream ($branch)"
            gh repo sync "$fork" --source "$upstream" --branch "$branch" || echo "Failed to sync $fork"
          done
